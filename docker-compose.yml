version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: "tourism"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tourism
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - db

volumes:
  pgdata:
